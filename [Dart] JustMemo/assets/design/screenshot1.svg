<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="2340" viewBox="0 0 1080 2340">
  <rect width="100%" height="100%" fill="#f6f8ff"/>
  <!-- phone bezel -->
  <rect x="60" y="120" width="960" height="2100" rx="60" fill="#ffffff" stroke="#dfe8ff" stroke-width="2"/>
  <!-- status bar -->
  <rect x="120" y="180" width="840" height="60" rx="12" fill="#6C8EFF" opacity="0.95"/>
  <text x="160" y="225" font-family="sans-serif" font-size="28" fill="#fff">JustMemo</text>
  <!-- notes list -->
  <g transform="translate(160,280)">
    <rect width="760" height="120" rx="14" fill="#fff" stroke="#eef4ff"/>
    <rect y="140" width="760" height="120" rx="14" fill="#fff" stroke="#eef4ff"/>
    <rect y="280" width="760" height="120" rx="14" fill="#fff" stroke="#eef4ff"/>
    <text x="24" y="76" font-family="sans-serif" font-size="28" fill="#0b2546">회의 노트 정리</text>
    <text x="24" y="216" font-family="sans-serif" font-size="28" fill="#0b2546">쇼핑 리스트</text>
    <text x="24" y="356" font-family="sans-serif" font-size="28" fill="#0b2546">아이디어 - 앱 개선</text>
  </g>
  <!-- floating add button -->
  <circle cx="920" cy="2100" r="70" fill="#4CC3FF"/>
  <line x1="900" y1="2100" x2="940" y2="2100" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <line x1="920" y1="2080" x2="920" y2="2120" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
</svg>
